<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me</title>

<style>
:root {
    --dark-navy: #0a192f;
    --orange: #ff7a00;
    --white: #ffffff;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: var(--dark-navy);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
}

.top-bar a {
    color: var(--white);
    text-decoration: none;
    border: 1px solid var(--white);
    padding: 8px 14px;
    border-radius: 6px;
    transition: 0.3s;
}

.top-bar a:hover {
    background: var(--white);
    color: var(--dark-navy);
}

/* TITLE */
h1 {
    text-align: center;
    color: var(--orange);
    margin: 20px 0;
    font-size: clamp(24px, 4vw, 36px);
}

/* MAIN CONTAINER */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px;
}

/* GRID LAYOUT */
.contact-wrapper {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
}

/* FORM BOX */
.contact-box {
    padding: 30px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    animation: fadeUp 0.8s ease;
}

/* SIDE PANEL */
.contact-side {
    padding: 30px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.03);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 20px;
}

/* INPUT GROUP */
.input-group {
    margin-bottom: 15px;
}

.input-group label {
    margin-bottom: 5px;
    display: block;
}

.input-group input,
.input-group textarea,
.input-group select {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--white);
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    background: var(--orange);
    border: none;
    border-radius: 6px;
    color: var(--white);
    font-size: 16px;
    cursor: pointer;
}

/* SIDE BUTTONS */
.whatsapp-btn, .cv-btn {
    text-align: center;
    padding: 12px;
    border-radius: 6px;
    text-decoration: none;
    transition: 0.3s;
}

.whatsapp-btn {
    border: 1px solid var(--white);
    color: var(--white);
}

.whatsapp-btn:hover {
    background: var(--white);
    color: var(--dark-navy);
}

.cv-btn {
    border: 1px solid var(--orange);
    color: var(--white);
}

.cv-btn:hover {
    background: var(--orange);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    border-top: 2px solid var(--orange);
}

/* ANIMATION */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
}

/* 📱 TABLET */
@media (max-width: 900px) {
    .contact-wrapper {
        grid-template-columns: 1fr;
    }
}

/* 📱 MOBILE */
@media (max-width: 500px) {
    .top-bar {
        padding: 15px;
        flex-direction: column;
        gap: 10px;
    }

    .container {
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="top-bar">
    <a href="index.html">← Home</a>
    <a href="projects.html">Projects →</a>
</div>

<h1>Contact Me</h1>

<div class="container">
<div class="contact-wrapper">

    <!-- FORM -->
    <div class="contact-box">
        <form onsubmit="sendEmail(event)">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label>Reason</label>
                <select id="reason" required>
                    <option value="">-- Select reason --</option>
                    <option>Job Opportunity</option>
                    <option>Freelance Work</option>
                    <option>Project Collaboration</option>
                    <option>Consultation</option>
                </select>
            </div>

            <div class="input-group">
                <label>Message</label>
                <textarea id="message" required></textarea>
            </div>

            <button type="submit">Send Message</button>

        </form>
    </div>

    <!-- SIDE PANEL -->
    <div class="contact-side">

        <a href="#" class="whatsapp-btn" onclick="sendWhatsApp()">
             Contact via WhatsApp
        </a>

        <a href="cv.pdf" download class="cv-btn">
             Download My CV
        </a>

    </div>

</div>
</div>

<footer>
    © <span id="year"></span> Horinetechie™ All Rights Reserved
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

function sendEmail(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const reason = document.getElementById("reason").value;
    const message = document.getElementById("message").value;

    const subject = encodeURIComponent(reason);
    const body = encodeURIComponent(
        "Name: " + name + "\nEmail: " + email + "\n\n" + message
    );

    window.location.href = `mailto:horinetechie@gmail.com?subject=${subject}&body=${body}`;
}

function sendWhatsApp() {
    const reason = document.getElementById("reason").value;

    if (!reason) {
        alert("Select a reason first");
        return;
    }

    const phone = "254793949829";
    const msg = encodeURIComponent("Hello, I want to discuss " + reason);

    window.open(`https://wa.me/${phone}?text=${msg}`, "_blank");
}
</script>

</body>
</html>
