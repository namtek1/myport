<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>

<style>
:root {
    --dark-navy: #0a192f;
    --orange: #ff7a00;
    --white: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: var(--dark-navy);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
}

.top-bar a {
    color: var(--white);
    text-decoration: none;
    border: 1px solid var(--white);
    padding: 8px 14px;
    border-radius: 6px;
    transition: 0.3s;
    font-size: 14px;
}

.top-bar a:hover {
    background: var(--white);
    color: var(--dark-navy);
}

/* TITLE */
h1 {
    text-align: center;
    color: var(--orange);
    margin-top: 10px;
}

/* PROJECT WRAPPER */
.projects-container {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 30px 20px;
}

/* GRID: 2 PER ROW */
.projects {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    max-width: 1000px;
    width: 100%;
}

/* PROJECT CARD */
.project-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    animation: fadeUp 0.8s ease;
    transition: transform 0.3s ease;
}

.project-card:hover {
    transform: translateY(-6px);
}

/* TITLE */
.project-card h2 {
    font-size: 18px;
    margin-bottom: 10px;
}

/* IMAGE FRAME */
.image-frame {
    width: 100%;
    height: 180px;
    border: 2px solid var(--orange);
    border-radius: 10px;
    overflow: hidden;
}

.image-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
}

.project-card:hover img {
    transform: scale(1.05);
}

/* ANIMATION */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    border-top: 2px solid var(--orange);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .projects {
        grid-template-columns: 1fr; /* stack on mobile */
    }
}
</style>
</head>

<body>

<!-- TOP LINKS -->
<div class="top-bar">
    <a href="index.html">← Home</a>
    <a href="experience.html">← Experience</a>
</div>

<h1>My Projects</h1>

<!-- PROJECT GRID -->
<div class="projects-container">
    <div class="projects">

        <!-- 1 -->
        <div class="project-card">
            <h2>Real-Estate/Property Management System</h2>
            <div class="image-frame">
                <img src="prop.webp">
            </div>
        </div>

        <!-- 2 -->
        <div class="project-card">
            <h2>Multi-Stall Software</h2>
            <div class="image-frame">
                <img src="stall.webp">
            </div>
        </div>

        <!-- 3 -->
        <div class="project-card">
            <h2>Online Academia App</h2>
            <div class="image-frame">
                <img src="academia.webp">
            </div>
        </div>

        <!-- 4 -->
        <div class="project-card">
            <h2>Smart Library Access Software </h2>
            <div class="image-frame">
                <img src="lib.webp">
            </div>
        </div>

        <!-- 5 -->
        <div class="project-card">
            <h2>Disease Predictor Software</h2>
            <div class="image-frame">
                <img src="predict.webp">
            </div>
        </div>

        <!-- 6 -->
        <div class="project-card">
            <h2>Gaming Software</h2>
            <div class="image-frame">
                <img src="game.webp">
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer>
    © <span id="year"></span> Horinetechie™ All Rights Reserved
</footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
