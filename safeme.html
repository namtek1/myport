<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Storage System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#ffffff;
    overflow-x:hidden;
}

/* LOGIN PAGE */

#loginPage{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
}

.login-box{
    width:360px;
    background:linear-gradient(135deg,#ffffff,#eef2ff);
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    border-top:6px solid blue;
    animation:zoomIn .8s ease;
}

@keyframes zoomIn{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.login-box h2{
    text-align:center;
    color:blue;
    margin-bottom:25px;
}

.login-box input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border-radius:10px;
    border:2px solid purple;
    font-size:16px;
    transition:.3s;
}

.login-box input:focus{
    outline:none;
    border-color:blue;
    box-shadow:0 0 12px rgba(0,0,255,.25);
}

.login-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(to right,blue,purple);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.login-box button:hover{
    transform:translateY(-3px);
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

#error{
    color:red;
    text-align:center;
    margin-top:10px;
}

/* MAIN PAGE */

#mainPage{
    display:none;
    min-height:100vh;
}

/* HEADER */
header{
    background:linear-gradient(90deg,#0052cc,#5a2ca0);
    color:white;
    text-align:center;
    padding:22px;
    font-size:34px;
    font-weight:bold;
    letter-spacing:2px;
    border-radius:0 0 20px 20px;
    box-shadow:0 6px 15px rgba(0,0,0,.2);
    position:sticky;
    top:0;
    z-index:1000;
}

/* GRID */

.grid{
    width:95%;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

/* FOLDER CARD */

.card{
    background:white;
    border-radius:15px;
    border:2px solid blue;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 15px 30px rgba(0,0,255,.2);
}

.card h3{
    color:blue;
    margin-bottom:12px;
}

/* ACTIONS */

.actions{
    display:none;
    flex-direction:column;
    gap:12px;
    margin-top:15px;
}

.linkBtn{
    text-decoration:none;
    background:purple;
    color:white;
    padding:12px;
    border-radius:8px;
    display:block;
}

.linkBtn:hover{
    background:blue;
}

.actionButtons{
    display:flex;
    justify-content:center;
    gap:10px;
}

.actionButtons button{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.add{
    background:blue;
}

.delete{
    background:purple;
}

.actionButtons button:hover{
    opacity:.85;
}

/* FOOTER */

footer{
    text-align:center;
    padding:20px;
    color:blue;
    font-weight:bold;
    border-top:2px solid blue;
    margin-top:30px;
}

/* RESPONSIVE */

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.grid{
grid-template-columns:1fr;
}

header{
font-size:26px;
}

.login-box{
width:92%;
}

}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<input
type="text"
id="username"
placeholder="Enter Username">

type="password"
id="password"
placeholder="Enter Password">

Login
</button>

<!-- MAIN PAGE -->

<div id="mainPage">

<header>

<div class="grid">

  <script>

// ===========================
// DEFAULT LOGIN
// ===========================

const defaultUsername = "amoh";
const defaultPassword = "amo34";

function login(){

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(username === defaultUsername && password === defaultPassword){

        document.getElementById("loginPage").style.display="none";
        document.getElementById("mainPage").style.display="block";

    }else{

        document.getElementById("error").innerHTML="Incorrect username or password.";

    }

}


// ===========================
// SHOW/HIDE FOLDER ACTIONS
// ===========================

function toggleActions(card){

    const current = card.querySelector(".actions");

    document.querySelectorAll(".actions").forEach(action=>{

        if(action!==current){

            action.style.display="none";

        }

    });

    if(current.style.display==="flex"){

        current.style.display="none";

    }else{

        current.style.display="flex";

    }

}



// ===========================
// ADD LINK
// ===========================

function addLink(button){

    const card = button.closest(".card");

    const link = card.querySelector(".linkBtn");

    const url = prompt("Enter the link");

    if(url!==null && url.trim()!==""){

        link.href=url;
        link.innerHTML="Open Stored Link";

        alert("Link added successfully.");

    }

}



// ===========================
// DELETE LINK
// ===========================

function deleteLink(button){

    if(!confirm("Delete this stored link?")){

        return;

    }

    const card = button.closest(".card");

    const link = card.querySelector(".linkBtn");

    link.href="#";
    link.innerHTML="No Link Stored";

}



// ===========================
// AUTO YEAR
// ===========================

document.getElementById("year").innerHTML =
new Date().getFullYear();

</script>
